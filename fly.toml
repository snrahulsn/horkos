# HORKOS — single deployable: MCP + REST + web + scheduler.
# Scheduler needs a long-running process: min_machines_running = 1, no autostop.
app = "horkos"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
